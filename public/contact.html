<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — MoodFilm</title>
  <meta name="description" content="Contact the MoodFilm team with your feedback or questions." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav id="navbar" class="scrolled">
    <div class="nav-inner">
      <a href="/" class="nav-logo"><span class="logo-icon">🎬</span><span class="logo-text">MoodFilm</span></a>
      <ul class="nav-links" id="nav-links">
        <li><a href="/" class="nav-link">Home</a></li>
        <li><a href="about.html" class="nav-link">About</a></li>
        <li><a href="contact.html" class="nav-link active">Contact</a></li>
        <li><a href="privacy.html" class="nav-link">Privacy</a></li>
      </ul>
      <div class="nav-right">
        <button class="hamburger" onclick="toggleMobileMenu()"><span></span><span></span><span></span></button>
      </div>
    </div>
  </nav>
  <div class="inner-page">
    <h1>Contact <span style="color:var(--accent)">Us</span></h1>
    <p class="page-sub">We'd love to hear from you</p>
    <p>Have a suggestion, found a bug, or just want to say hello? Fill out the form below.</p>
    <form class="contact-form" onsubmit="handleSubmit(event)">
      <div class="form-group">
        <label>Your Name</label>
        <input type="text" placeholder="John Doe" required />
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" placeholder="john@example.com" required />
      </div>
      <div class="form-group">
        <label>Subject</label>
        <input type="text" placeholder="Feedback, Bug Report, Question..." required />
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea placeholder="Write your message here..." required></textarea>
      </div>
      <button type="submit" class="btn-primary" style="align-self:flex-start;padding:13px 32px;">Send Message →</button>
      <p id="form-status" style="font-size:14px;color:var(--text2);display:none;"></p>
    </form>
  </div>
  <footer>
    <div class="footer-bottom" style="border-top:none;">
      <p>© 2025 MoodFilm · All rights reserved</p>
    </div>
  </footer>
  <script>
    function toggleMobileMenu() { document.getElementById('nav-links').classList.toggle('open'); }
    window.addEventListener('scroll', () => { document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 60); });
    function handleSubmit(e) {
      e.preventDefault();
      const s = document.getElementById('form-status');
      s.style.display = 'block';
      s.style.color   = '#22c55e';
      s.textContent   = '✅ Message sent! We\'ll get back to you within 1–3 business days.';
      e.target.reset();
    }
  </script>
</body>
</html>
